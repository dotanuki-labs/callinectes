name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-24.04

    steps:
      - name: Project Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint Bash Scripts
        uses: dotanuki-labs/github-actions/quality/bash@a7a632c1f8edc37e8d49b916363dba064e72e893

      - name: Check MIT license on source files
        uses: korandoru/hawkeye@c57037afedf940370c41eb660837c8aa928d472a # v6.5.1

      - name: Run Component Tests
        run: ./component-tests.sh
